services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rss}
      POSTGRES_DB: ${POSTGRES_DB:-rssreader}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rss} -d ${POSTGRES_DB:-rssreader}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    image: ${REGISTRY:-localhost}/rss-reader-backend:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rss}:${POSTGRES_PASSWORD:-rss}@db:5432/${POSTGRES_DB:-rssreader}
      BIND_ADDR: 0.0.0.0:8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      FEED_REFRESH_INTERVAL_SECS: ${FEED_REFRESH_INTERVAL_SECS:-900}
      # Auth: unset = disabled (LAN default). Set to require Bearer token on /api.
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      # Backup: unset = /api/backup/* returns 503. Optional pg_dump scheduler off
      # unless BACKUP_DIR + interval are both set.
      BACKUP_TOKEN: ${BACKUP_TOKEN:-}
      BACKUP_DIR: ${BACKUP_DIR:-}
      BACKUP_PGDUMP_INTERVAL_SECS: ${BACKUP_PGDUMP_INTERVAL_SECS:-}
      # Daily AI digest (#23). Off unless DIGEST_ENABLED=true; SMTP optional.
      DIGEST_ENABLED: ${DIGEST_ENABLED:-}
      DIGEST_HOUR_UTC: ${DIGEST_HOUR_UTC:-}
      DIGEST_LANG: ${DIGEST_LANG:-}
      # Semantic clustering (#26). Off unless CLUSTERING_ENABLED=true.
      CLUSTERING_ENABLED: ${CLUSTERING_ENABLED:-}
      CLUSTERING_INTERVAL_SECS: ${CLUSTERING_INTERVAL_SECS:-}
      # Web Push (#31). Both unset = /api/push/* returns 503 (feature disabled).
      # Generate with scripts/gen-vapid.sh and put into .env. Never commit keys.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      RUST_LOG: ${RUST_LOG:-info,rss_reader_backend=debug}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: ${REGISTRY:-localhost}/rss-reader-frontend:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8081}:80"

volumes:
  pgdata:

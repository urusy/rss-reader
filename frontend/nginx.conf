server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- セキュリティヘッダ（監査 #6） --------------------------------------
    # server レベルの add_header は、location 側で add_header を使わない限り
    # 全レスポンスに継承される（/api も含む）。
    # CSP: スクリプトは自オリジンのみ（theme-init.js を外部化して inline を排除）。
    # style の 'unsafe-inline' は sanitize 済みフィード本文の style 属性と
    # テーマ切替の colorScheme 直接指定に必要（DOMPurify で許可プロパティを制限済み）。
    # img/media はフィード由来の外部 URL を許可する。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: http: data:; media-src 'self' https: http:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; manifest-src 'self'; worker-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy API calls to the backend service (compose network name: backend).
    location /api/ {
        # Docker 内蔵 DNS(127.0.0.11) でリクエスト時に都度解決する。
        # 静的 proxy_pass だと起動時に一度だけ解決して IP をキャッシュするため、
        # backend コンテナの再作成（IP 変化）で 502 になり、backend が落ちている間は
        # nginx 自体が "host not found in upstream" で起動できなくなる。
        # proxy_pass に変数を使うと解決が遅延され、両方の問題が消える
        # （変数 + URI 無し指定ではリクエスト URI がそのまま渡る = 従来と同じ経路）。
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        # $http_host はポート込みの Host ヘッダをそのまま転送する。$host だと
        # ポートが落ち、backend の CSRF 検証（Origin のオーソリティ == Host）が
        # 「Origin: http://ip:8080 vs Host: ip」の不一致で保護 POST を 403 にする。
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # LLM calls can be slow
        # Backup import uploads the whole NDJSON dump; backend allows 256MB
        # (DefaultBodyLimit). Match it so nginx doesn't 413 first. Default is 1MB.
        client_max_body_size 256m;
    }

    # --- GReader 互換 API（機能29） -----------------------------------------
    # これがないと SPA フォールバックが index.html を返してしまう。
    # backend 側は SYNC_API_ENABLED=true のときだけルートを持つ（無効時は
    # 汎用 401 — 存在を隠す）。
    # ★完全一致 — 他の /accounts/* はプロキシしない。
    location = /accounts/ClientLogin {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 64k;   # Email + Passwd のみ
    }
    location /reader/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        # /api/ の 256m（認証済みバックアップ用）を無認証到達面に継承しない。
        # nginx はボディを先に受信バッファするため大きな上限は DoS ベクタ。
        # 1000 件の id バッチでも ~60KB — 8m で十分。
        client_max_body_size 8m;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

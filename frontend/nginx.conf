server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (compose network name: backend).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # LLM calls can be slow
        # Backup import uploads the whole NDJSON dump; backend allows 256MB
        # (DefaultBodyLimit). Match it so nginx doesn't 413 first. Default is 1MB.
        client_max_body_size 256m;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

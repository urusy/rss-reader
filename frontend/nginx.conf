server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- セキュリティヘッダ（監査 #6） --------------------------------------
    # server レベルの add_header は、location 側で add_header を使わない限り
    # 全レスポンスに継承される（/api も含む）。
    # CSP: スクリプトは自オリジンのみ（theme-init.js を外部化して inline を排除）。
    # style の 'unsafe-inline' は sanitize 済みフィード本文の style 属性と
    # テーマ切替の colorScheme 直接指定に必要（DOMPurify で許可プロパティを制限済み）。
    # img/media はフィード由来の外部 URL を許可する。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: http: data:; media-src 'self' https: http:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; manifest-src 'self'; worker-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy API calls to the backend service (compose network name: backend).
    location /api/ {
        proxy_pass http://backend:8080;
        # $http_host はポート込みの Host ヘッダをそのまま転送する。$host だと
        # ポートが落ち、backend の CSRF 検証（Origin のオーソリティ == Host）が
        # 「Origin: http://ip:8080 vs Host: ip」の不一致で保護 POST を 403 にする。
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # LLM calls can be slow
        # Backup import uploads the whole NDJSON dump; backend allows 256MB
        # (DefaultBodyLimit). Match it so nginx doesn't 413 first. Default is 1MB.
        client_max_body_size 256m;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
